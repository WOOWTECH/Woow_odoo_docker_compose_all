[options]
; Odoo 18 Configuration File

; Addons path
addons_path = /mnt/extra-addons

; Database settings (set via environment variables in docker-compose)
; db_host = db
; db_port = 5432
; db_user = odoo
; db_password =

; Admin password for database management
admin_passwd = admin

; Logging
log_level = info

; Performance tuning
workers = 0
max_cron_threads = 1
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 600
limit_time_real = 1200

; Proxy mode (set to True if behind reverse proxy)
proxy_mode = False
