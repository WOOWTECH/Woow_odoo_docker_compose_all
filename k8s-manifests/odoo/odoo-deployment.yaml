---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: odoo
  namespace: odoo
  labels:
    app: odoo
    component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: odoo
      component: web
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: odoo
        component: web
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL to be ready..."
              until nc -z db 5432; do
                echo "PostgreSQL is not ready yet - sleeping 2s"
                sleep 2
              done
              echo "PostgreSQL is ready!"
      containers:
        - name: odoo
          image: odoo:18
          ports:
            - containerPort: 8069
              name: http
              protocol: TCP
          env:
            - name: HOST
              valueFrom:
                configMapKeyRef:
                  name: odoo-config
                  key: HOST
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: odoo-config
                  key: PORT
            - name: USER
              valueFrom:
                secretKeyRef:
                  name: odoo-db-secret
                  key: POSTGRES_USER
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odoo-db-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: odoo-web-data
              mountPath: /var/lib/odoo
            - name: odoo-addons
              mountPath: /mnt/extra-addons
            - name: odoo-config-volume
              mountPath: /etc/odoo/odoo.conf
              subPath: odoo.conf
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /web/login
              port: 8069
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /web/login
              port: 8069
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /web/login
              port: 8069
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 30
      restartPolicy: Always
      volumes:
        - name: odoo-web-data
          persistentVolumeClaim:
            claimName: odoo-web-data
        - name: odoo-addons
          persistentVolumeClaim:
            claimName: odoo-addons
        - name: odoo-config-volume
          configMap:
            name: odoo-config
            items:
              - key: odoo.conf
                path: odoo.conf
