---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: odoo

resources:
  - namespace.yaml
  - secret.yaml
  - configmap.yaml
  - pvc.yaml
  - postgres-statefulset.yaml
  - postgres-service.yaml
  - odoo-deployment.yaml
  - odoo-service.yaml

labels:
  - pairs:
      app: odoo
    includeSelectors: true
