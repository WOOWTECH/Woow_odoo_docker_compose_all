name: Woow Odoo 18
version: 18.0.1.0
slug: woow-odoo
description: Odoo 18 ERP with built-in PostgreSQL 16 and Nginx reverse proxy (HTTP for LAN, use Cloudflare Tunnel for HTTPS)
url: https://www.odoo.com
webui: "http://[HOST]:[PORT:8069]"
arch:
  - aarch64
  - amd64
init: false
startup: application
boot: auto
map:
  - type: addon_config
    read_only: false
  - type: share
    read_only: false
backup: cold
backup_exclude:
  - "**/cache"
  - "**/logs"
  - "**/sessions"
tmpfs: true
ports:
  8069/tcp: 8069
  8072/tcp: null
  5432/tcp: null
ports_description:
  8069/tcp: Odoo Web Interface
  8072/tcp: Odoo WebSocket/Longpolling
  5432/tcp: PostgreSQL Database
schema:
  TZ: str?
  db_password: password
  admin_password: password?
  odoo_workers: int(0,16)?
  odoo_max_cron_threads: int(0,4)?
  odoo_limit_memory_hard: int?
  odoo_limit_memory_soft: int?
  odoo_limit_time_cpu: int?
  odoo_limit_time_real: int?
  odoo_log_level: list(debug|info|warn|error|critical)?
  odoo_proxy_mode: bool?
  odoo_extra_addons: str?
  odoo_db_name: str?
  odoo_without_demo: bool?
  env_vars:
    - key: match(^[A-Za-z0-9_-]+$)
      value: str
options:
  TZ: Asia/Taipei
  db_password: odoo
  odoo_workers: 2
  odoo_max_cron_threads: 1
  odoo_log_level: info
  odoo_proxy_mode: true
  odoo_db_name: odoo
  odoo_without_demo: true
  env_vars: []
