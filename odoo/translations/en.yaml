configuration:
  TZ:
    name: Timezone
    description: >-
      Timezone for Odoo and PostgreSQL. (Default: `Asia/Taipei`)

      Find your timezone:
      https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
  db_password:
    name: Database Password
    description: >-
      PostgreSQL password for the Odoo database user.
      Change this from the default for better security.
  admin_password:
    name: Odoo Master Password
    description: >-
      Master password for Odoo database management.
      Leave empty to disable database management via web UI.
  odoo_workers:
    name: Workers
    description: >-
      Number of Odoo worker processes. (Default: `2`)

      Set to `0` to disable multi-processing (single thread mode).
      When `workers > 0`, Odoo automatically starts a gevent worker
      for WebSocket/longpolling on port 8072.
  odoo_max_cron_threads:
    name: Max Cron Threads
    description: >-
      Number of cron worker threads. (Default: `1`)
  odoo_limit_memory_hard:
    name: Memory Hard Limit (bytes)
    description: >-
      Hard memory limit per worker in bytes.
      Worker is killed if exceeding this limit.
      (Default: `2684354560` = 2.5GB)
  odoo_limit_memory_soft:
    name: Memory Soft Limit (bytes)
    description: >-
      Soft memory limit per worker in bytes.
      Worker is recycled after request if exceeding.
      (Default: `2147483648` = 2GB)
  odoo_limit_time_cpu:
    name: CPU Time Limit (seconds)
    description: >-
      Maximum CPU time per request in seconds.
      (Default: `60`)
  odoo_limit_time_real:
    name: Real Time Limit (seconds)
    description: >-
      Maximum real time per request in seconds.
      (Default: `120`)
  odoo_log_level:
    name: Log Level
    description: >-
      Odoo log level. (Default: `info`)
  odoo_proxy_mode:
    name: Proxy Mode
    description: >-
      Enable proxy mode for X-Forwarded headers.
      Should be `true` when behind Nginx or Cloudflare Tunnel.
  odoo_extra_addons:
    name: Extra Addons Path
    description: >-
      Additional addon paths (comma-separated).
      These will be prepended to the default addon path.
  odoo_db_name:
    name: Database Name
    description: >-
      Name of the PostgreSQL database for Odoo.
      (Default: `odoo`)
  odoo_without_demo:
    name: Without Demo Data
    description: >-
      Skip loading demo data on new databases.
      (Default: `true`)
  env_vars:
    name: Extra Environment Variables
    description: >-
      Additional environment variables as key-value pairs.
network:
  8069/tcp: Odoo Web Interface
  8072/tcp: Odoo WebSocket/Longpolling
  5432/tcp: PostgreSQL Database
