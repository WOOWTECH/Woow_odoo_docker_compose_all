configuration:
  TZ:
    name: 時區
    description: >-
      Odoo 和 PostgreSQL 使用的時區。（預設：`Asia/Taipei`）

      可在此查詢您的時區識別碼：
      https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
  db_password:
    name: 資料庫密碼
    description: >-
      PostgreSQL 中 Odoo 資料庫使用者的密碼。
      建議修改預設密碼以提升安全性。
  admin_password:
    name: Odoo 主密碼
    description: >-
      Odoo 資料庫管理的主密碼（Master Password）。
      留空可停用透過網頁介面管理資料庫的功能。
  odoo_workers:
    name: 工作行程數
    description: >-
      Odoo 工作行程（Worker）數量。（預設：`2`）

      設定為 `0` 將停用多行程模式（單執行緒模式）。
      當 `workers > 0` 時，Odoo 會自動啟動 gevent 工作行程
      用於 WebSocket/長輪詢，監聽 8072 連接埠。

      建議值：CPU 核心數 × 2 + 1
  odoo_max_cron_threads:
    name: 排程執行緒數上限
    description: >-
      排程（Cron）工作執行緒的數量。（預設：`1`）
  odoo_limit_memory_hard:
    name: 記憶體硬限制（位元組）
    description: >-
      每個工作行程的記憶體硬限制（位元組）。
      超過此限制時，工作行程將被強制終止。
      （預設：`2684354560` = 2.5GB）
  odoo_limit_memory_soft:
    name: 記憶體軟限制（位元組）
    description: >-
      每個工作行程的記憶體軟限制（位元組）。
      處理完請求後如超過此限制，工作行程將被回收。
      （預設：`2147483648` = 2GB）
  odoo_limit_time_cpu:
    name: CPU 時間限制（秒）
    description: >-
      每個請求的最大 CPU 處理時間（秒）。
      （預設：`60`）
  odoo_limit_time_real:
    name: 實際時間限制（秒）
    description: >-
      每個請求的最大實際處理時間（秒）。
      （預設：`120`）
  odoo_log_level:
    name: 日誌等級
    description: >-
      Odoo 日誌輸出等級。（預設：`info`）
  odoo_proxy_mode:
    name: 代理模式
    description: >-
      啟用代理模式以正確處理 X-Forwarded 標頭。
      在 Nginx 或 Cloudflare Tunnel 後方運行時應設為 `true`。
  odoo_extra_addons:
    name: 額外模組路徑
    description: >-
      額外的 Odoo 模組路徑（以逗號分隔）。
      這些路徑會加入到預設模組路徑之前。
  odoo_db_name:
    name: 資料庫名稱
    description: >-
      Odoo 使用的 PostgreSQL 資料庫名稱。
      （預設：`odoo`）
  odoo_without_demo:
    name: 不載入示範資料
    description: >-
      建立新資料庫時不載入示範資料。
      （預設：`true`）
  env_vars:
    name: 額外環境變數
    description: >-
      以鍵值對方式設定額外的環境變數。
network:
  8069/tcp: Odoo 網頁介面
  8072/tcp: Odoo WebSocket/長輪詢
  5432/tcp: PostgreSQL 資料庫
