services:
  woow-odoo:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        BUILD_ARCH: amd64
    container_name: woow-odoo
    ports:
      - "8069:8069"
      - "8072:8072"
    volumes:
      - odoo-data:/data
      - ./options.json:/data/options.json:ro
    environment:
      - TZ=Asia/Taipei
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8069/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

volumes:
  odoo-data:
